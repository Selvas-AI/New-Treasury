<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages SPA 라우팅 리다이렉트 (base = '/')
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace('/?p=' + encodeURIComponent(path + search) + hash);
  </script>
</head>
<body></body>
</html>
